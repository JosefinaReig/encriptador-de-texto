<!DOCTYPE html>
<html lang="es">
 
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="reset.css">
    <link rel="stylesheet" href="style.css">

    <title>Encriptador de texto</title>
</head>

<body>
    <header>
        <nav>
            <h1><img src="img/Logo.png" alt="Logo Alura Latam"></h1>
        </nav>
    </header>
    <main>
        <div class="container">
            <div class="principal">
                <form>
                    <p class="titulo" id="titulo">Ingrese su texto aquí</p>
                    <textarea class="mensaje" cols="42" rows="20" id="mensaje"></textarea>
                </form>
                <div class="signo-recomendacion">
                    <img src="img/exclamacion.png" class="signo">
                    <p class="recomendacion">Sólo letras minúsculas y sin acentos</p>
                </div>
                <div class="botones">
                    <button class="boton-uno" onclick="btnEncriptar()">Encriptar</button>
                    <button class="boton-dos" onclick="btnDesencriptar()">Desencriptar</button>
                </div>
            </div>
            <div class="encriptacion" id="encriptacion">
                <img src="img/Muñeco.png" alt="persona con lupa" id="muñeco">
                <h3></h3>
                <br>
                <h4></h4>
            </div>
        </div>
    </main>
    <footer>
        <h4>Josefina Reig desarrolló la página web</h4>
    </footer>
    <script src="app.js"></script>
</body>

</html>
